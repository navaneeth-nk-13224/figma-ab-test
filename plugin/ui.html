<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* ── Reset & Base ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    color: #e5e5e5;
    background: #2c2c2c;
    height: 100%;
    overflow-x: hidden;
  }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid #444;
    background: #333;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab-bar button {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: transparent;
    color: #999;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab-bar button.active {
    color: #fff;
    border-bottom-color: #0d99ff;
  }
  .tab-bar button:hover:not(.active) { color: #ccc; }

  /* ── Content ── */
  .tab-content { display: none; padding: 16px; }
  .tab-content.active { display: block; }

  /* ── Selection Status ── */
  .selection-status {
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .selection-status.valid { background: rgba(20,174,92,0.12); border: 1px solid rgba(20,174,92,0.3); }
  .selection-status.invalid { background: rgba(242,72,34,0.10); border: 1px solid rgba(242,72,34,0.25); }
  .selection-status .label { color: #999; font-size: 11px; }
  .selection-status .name { color: #fff; font-weight: 500; }

  /* ── Form ── */
  label {
    display: block;
    font-size: 11px;
    color: #999;
    margin-bottom: 4px;
    font-weight: 500;
  }
  input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #4b4b4b;
    background: #383838;
    color: #fff;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: #0d99ff; }
  .form-group { margin-bottom: 12px; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  /* ── Buttons ── */
  .btn {
    padding: 9px 16px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: #0d99ff;
    color: #fff;
    width: 100%;
  }
  .btn-primary:hover { background: #0b8ce6; }
  .btn-primary:disabled { background: #555; color: #888; cursor: not-allowed; }
  .btn-sm {
    padding: 5px 10px;
    font-size: 11px;
    border-radius: 5px;
  }
  .btn-ghost {
    background: transparent;
    color: #0d99ff;
    border: 1px solid #0d99ff40;
  }
  .btn-ghost:hover { background: #0d99ff15; }
  .btn-danger {
    background: transparent;
    color: #f24822;
    border: 1px solid #f2482240;
  }
  .btn-danger:hover { background: #f2482215; }

  /* ── Link Display ── */
  .link-box {
    margin-top: 14px;
    padding: 12px;
    background: #1e3a1e;
    border: 1px solid #2a5e2a;
    border-radius: 6px;
    display: none;
  }
  .link-box.show { display: block; }
  .link-box .link-title { color: #4ade80; font-weight: 600; margin-bottom: 6px; }
  .link-url {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .link-url input {
    flex: 1;
    background: #143814;
    border-color: #2a5e2a;
    color: #a3e6a3;
    font-family: monospace;
    font-size: 11px;
  }

  /* ── Error ── */
  .tooltip-wrap {
    position: relative;
    display: inline-block;
  }
  .tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }
  .tooltip.show { opacity: 1; }
  .btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    padding: 0;
    border: 1px solid #444;
    border-radius: 6px;
    background: transparent;
    color: #aaa;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: #888; color: #fff; }
  .btn-icon svg { width: 14px; height: 14px; }
  .error-box {
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(242,72,34,0.12);
    border: 1px solid rgba(242,72,34,0.3);
    border-radius: 6px;
    color: #f87171;
    display: none;
  }
  .error-box.show { display: block; }

  /* ── Loading ── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #fff4;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Tests List ── */
  .test-card {
    background: #383838;
    border: 1px solid #4b4b4b;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .test-card-title {
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .test-card-date {
    color: #888;
    font-size: 11px;
    margin-bottom: 10px;
  }
  .test-card-thumbs {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .test-card-thumb {
    flex: 1;
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #4b4b4b;
    background: #2c2c2c;
  }
  .test-card-thumb img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    display: block;
  }
  .test-card-thumb-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 2px 6px;
    font-size: 10px;
    font-weight: 500;
    color: #fff;
    background: rgba(0,0,0,0.6);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vote-bars { margin-bottom: 10px; }
  .vote-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .vote-label { width: 70px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vote-bar-track {
    flex: 1;
    height: 8px;
    background: #2c2c2c;
    border-radius: 4px;
    overflow: hidden;
  }
  .vote-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .vote-bar-fill.a { background: #0d99ff; }
  .vote-bar-fill.b { background: #f2a30d; }
  .vote-pct { width: 56px; text-align: right; color: #aaa; }
  .vote-total { font-size: 11px; color: #777; margin-bottom: 8px; }
  .test-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: #777;
  }
  .empty-state-icon { font-size: 28px; margin-bottom: 8px; }
  .empty-state-text { font-size: 13px; }
  .empty-state-sub { font-size: 11px; margin-top: 4px; color: #555; }
</style>
</head>
<body>

<!-- Tabs -->
<div class="tab-bar">
  <button id="tab-create" class="active" onclick="switchTab('create')">Create</button>
  <button id="tab-tests" onclick="switchTab('tests')">Votes</button>
</div>

<!-- ── Create Tab ── -->
<div id="content-create" class="tab-content active">

  <div style="font-size:12px; color:#aaa; margin-bottom:12px; line-height:1.4;">Share a vote link to collect votes and gather design insights.</div>

  <div id="selection-status" class="selection-status invalid">
    Select exactly 2 frames to create an AB test.
  </div>

  <div class="form-group">
    <label>Test Title</label>
    <input type="text" id="input-title" placeholder="e.g. Which design is better?" maxlength="100">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Label A</label>
      <input type="text" id="input-label-a" placeholder="Option A" maxlength="40">
    </div>
    <div class="form-group">
      <label>Label B</label>
      <input type="text" id="input-label-b" placeholder="Option B" maxlength="40">
    </div>
  </div>

  <button id="btn-create" class="btn btn-primary" onclick="createTest()" disabled>
    Create AB Test
  </button>

  <div id="link-box" class="link-box">
    <div class="link-title">&#10003; Test created!</div>
    <div style="color:#a3e6a3; font-size:11px; margin-bottom:8px;">Share this link to collect votes and gather design insights.</div>
    <div class="link-url">
      <input type="text" id="link-url-input" readonly>
      <span class="tooltip-wrap">
        <span class="tooltip" id="copy-tooltip">Copied!</span>
        <button class="btn btn-sm btn-ghost" onclick="copyLink()">Copy</button>
      </span>
      <button class="btn-icon" id="link-open-btn" onclick="openLink()" title="Open in browser">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M9 2h5v5"/><path d="M14 2L7 9"/></svg>
      </button>
    </div>
  </div>

  <div id="error-box" class="error-box"></div>
</div>

<!-- ── My Tests Tab ── -->
<div id="content-tests" class="tab-content">
  <div id="tests-list"></div>
</div>

<script>
// ━━━ Configuration ━━━
const SERVER_URL = 'https://figma-ab-test-50023798948.development.catalystappsail.in';

// ━━━ State ━━━
let selectionValid = false;
let isCreating = false;

// ━━━ Tab Switching ━━━
function switchTab(tab) {
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('content-' + tab).classList.add('active');

  if (tab === 'tests') {
    parent.postMessage({ pluginMessage: { type: 'load-tests' } }, '*');
  }
}

// ━━━ Selection Handling ━━━
function updateSelection(valid, data) {
  selectionValid = valid;
  const el = document.getElementById('selection-status');
  const btn = document.getElementById('btn-create');

  if (valid) {
    el.className = 'selection-status valid';
    el.innerHTML =
      '&#10003; 2 frames selected<br>' +
      '<span class="label">A:</span> <span class="name">' + escapeHtml(data.frames[0].name) + '</span><br>' +
      '<span class="label">B:</span> <span class="name">' + escapeHtml(data.frames[1].name) + '</span>';
    btn.disabled = false;

    // Auto-fill labels from frame names
    const labelA = document.getElementById('input-label-a');
    const labelB = document.getElementById('input-label-b');
    labelA.value = data.frames[0].name;
    labelB.value = data.frames[1].name;
  } else {
    el.className = 'selection-status invalid';
    const count = data ? data.count : 0;
    if (count === 0) {
      el.textContent = 'Select exactly 2 frames to create an AB test.';
    } else if (count === 1) {
      el.textContent = 'Select one more frame. (1 of 2 selected)';
    } else {
      el.textContent = 'Too many items selected (' + count + '). Select exactly 2 frames.';
    }
    btn.disabled = true;
  }
}

// ━━━ Create Test ━━━
function createTest() {
  if (!selectionValid || isCreating) return;
  isCreating = true;

  const btn = document.getElementById('btn-create');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Exporting frames...';

  hideError();
  hideLinkBox();

  parent.postMessage({ pluginMessage: { type: 'export-frames' } }, '*');
}

async function uploadTest(imageA, imageB, nameA, nameB) {
  const btn = document.getElementById('btn-create');
  btn.innerHTML = '<span class="spinner"></span> Creating test...';

  const title = document.getElementById('input-title').value.trim() || 'Untitled Test';
  const labelA = document.getElementById('input-label-a').value.trim() || nameA || 'Option A';
  const labelB = document.getElementById('input-label-b').value.trim() || nameB || 'Option B';

  // Convert Uint8Array to base64
  const b64A = uint8ArrayToBase64(new Uint8Array(imageA));
  const b64B = uint8ArrayToBase64(new Uint8Array(imageB));

  try {
    const res = await fetch(SERVER_URL + '/api/tests', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        title: title,
        imageA: b64A,
        imageB: b64B,
        labelA: labelA,
        labelB: labelB
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || 'Server returned ' + res.status);
    }

    const data = await res.json();

    // Show link
    document.getElementById('link-url-input').value = data.url;
    document.getElementById('link-box').classList.add('show');

    // Save test reference locally
    parent.postMessage({
      pluginMessage: {
        type: 'save-test',
        test: { id: data.id, title: title, url: data.url, createdAt: new Date().toISOString() }
      }
    }, '*');

    // Clear inputs for next test
    document.getElementById('input-title').value = '';
    document.getElementById('input-label-a').value = '';
    document.getElementById('input-label-b').value = '';

  } catch (err) {
    showError('Failed to create test: ' + err.message);
  } finally {
    isCreating = false;
    btn.disabled = !selectionValid;
    btn.textContent = 'Create AB Test';
  }
}

// ━━━ My Tests ━━━
async function renderTests(tests) {
  const container = document.getElementById('tests-list');

  if (!tests || tests.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-state-icon">&#128202;</div>' +
        '<div class="empty-state-text">No tests yet</div>' +
        '<div class="empty-state-sub">Create your first AB test from the Create tab.</div>' +
      '</div>';
    return;
  }

  container.innerHTML = '';

  for (const test of tests) {
    const card = document.createElement('div');
    card.className = 'test-card';

    const dateStr = test.createdAt ? timeAgo(new Date(test.createdAt)) : '';

    card.innerHTML =
      '<div class="test-card-title">' + escapeHtml(test.title) + '</div>' +
      '<div class="test-card-date">' + escapeHtml(dateStr) + '</div>' +
      '<div class="test-card-thumbs" id="thumbs-' + test.id + '"></div>' +
      '<div class="vote-bars" id="votes-' + test.id + '">' +
        '<div style="color:#777; font-size:11px;">Loading results...</div>' +
      '</div>' +
      '<div class="test-card-actions">' +
        '<button class="btn btn-sm btn-ghost tooltip-wrap" onclick="copyUrl(this, \'' + escapeHtml(test.url) + '\')"><span class="tooltip">Copied!</span>Copy Link</button>' +
        '<button class="btn-icon" onclick="window.open(\'' + escapeHtml(test.url) + '\', \'_blank\')" title="Open in browser"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M9 2h5v5"/><path d="M14 2L7 9"/></svg></button>' +
        '<button class="btn btn-sm btn-ghost" onclick="refreshResults(\'' + test.id + '\')">Refresh</button>' +
        '<button class="btn btn-sm btn-danger" onclick="deleteTest(\'' + test.id + '\')">Close Vote</button>' +
      '</div>';

    container.appendChild(card);
    loadResults(test.id);
    loadThumbnails(test.id);
  }
}

async function loadThumbnails(testId) {
  const el = document.getElementById('thumbs-' + testId);
  if (!el) return;
  try {
    const res = await fetch(SERVER_URL + '/api/tests/' + testId);
    if (!res.ok) return;
    const data = await res.json();
    el.innerHTML =
      '<div class="test-card-thumb">' +
        '<img src="' + escapeHtml(data.imageA_url) + '" alt="' + escapeHtml(data.labelA) + '">' +
        '<div class="test-card-thumb-label">' + escapeHtml(data.labelA) + '</div>' +
      '</div>' +
      '<div class="test-card-thumb">' +
        '<img src="' + escapeHtml(data.imageB_url) + '" alt="' + escapeHtml(data.labelB) + '">' +
        '<div class="test-card-thumb-label">' + escapeHtml(data.labelB) + '</div>' +
      '</div>';
  } catch (_) {}
}

async function loadResults(testId) {
  const el = document.getElementById('votes-' + testId);
  if (!el) return;

  try {
    const res = await fetch(SERVER_URL + '/api/tests/' + testId + '/results');
    if (!res.ok) throw new Error('Not found');

    const data = await res.json();
    const total = data.totalVotes || 0;
    const pctA = total > 0 ? Math.round((data.votesA / total) * 100) : 0;
    const pctB = total > 0 ? Math.round((data.votesB / total) * 100) : 0;

    el.innerHTML =
      '<div class="vote-row">' +
        '<span class="vote-label">' + escapeHtml(data.labelA || 'A') + '</span>' +
        '<div class="vote-bar-track"><div class="vote-bar-fill a" style="width:' + pctA + '%"></div></div>' +
        '<span class="vote-pct">' + pctA + '% (' + data.votesA + ')</span>' +
      '</div>' +
      '<div class="vote-row">' +
        '<span class="vote-label">' + escapeHtml(data.labelB || 'B') + '</span>' +
        '<div class="vote-bar-track"><div class="vote-bar-fill b" style="width:' + pctB + '%"></div></div>' +
        '<span class="vote-pct">' + pctB + '% (' + data.votesB + ')</span>' +
      '</div>' +
      '<div class="vote-total">' + total + ' total vote' + (total !== 1 ? 's' : '') + '</div>';
  } catch (err) {
    el.innerHTML = '<div style="color:#888; font-size:11px;">Could not load results. Is the server running?</div>';
  }
}

function refreshResults(testId) {
  const el = document.getElementById('votes-' + testId);
  if (el) el.innerHTML = '<div style="color:#777; font-size:11px;">Refreshing...</div>';
  loadResults(testId);
}

async function deleteTest(testId) {
  const btn = document.querySelector('[onclick="deleteTest(\'' + testId + '\')"');
  if (btn) { btn.disabled = true; btn.textContent = 'Closing...'; }

  try {
    const res = await fetch(SERVER_URL + '/api/tests/' + encodeURIComponent(testId) + '/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }
    });
    if (!res.ok) throw new Error('Server error');
    parent.postMessage({ pluginMessage: { type: 'delete-test', testId: testId } }, '*');
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Close Vote'; }
    alert('Failed to close vote. Please try again.');
  }
}

function copyToClipboard(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function copyUrl(btn, url) {
  copyToClipboard(url);
  showTooltip(btn);
}

function copyLink() {
  const input = document.getElementById('link-url-input');
  copyToClipboard(input.value);
  showTooltip(document.getElementById('copy-tooltip').parentElement);
}

function openLink() {
  const url = document.getElementById('link-url-input').value;
  if (url) window.open(url, '_blank');
}

function showTooltip(wrap) {
  const tip = wrap.querySelector('.tooltip');
  if (!tip) return;
  tip.classList.add('show');
  setTimeout(() => tip.classList.remove('show'), 1500);
}

// ━━━ Messages from Plugin Code ━━━
window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  switch (msg.type) {
    case 'selection-valid':
      updateSelection(true, msg);
      break;
    case 'selection-invalid':
      updateSelection(false, msg);
      break;
    case 'frames-exported':
      uploadTest(msg.imageA, msg.imageB, msg.nameA, msg.nameB);
      break;
    case 'error':
      isCreating = false;
      const btn = document.getElementById('btn-create');
      btn.disabled = !selectionValid;
      btn.textContent = 'Create AB Test';
      showError(msg.message);
      break;
    case 'tests-loaded':
      renderTests(msg.tests);
      break;
    case 'test-saved':
      // could show confirmation
      break;
  }
};

// ━━━ Helpers ━━━
function uint8ArrayToBase64(bytes) {
  let binary = '';
  const len = bytes.byteLength;
  for (let i = 0; i < len; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function showError(message) {
  const el = document.getElementById('error-box');
  el.textContent = message;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-box').classList.remove('show');
}

function hideLinkBox() {
  document.getElementById('link-box').classList.remove('show');
}

function timeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);
  if (seconds < 60) return 'Just now';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + 'm ago';
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.floor(hours / 24);
  if (days < 30) return days + 'd ago';
  return date.toLocaleDateString();
}


</script>
</body>
</html>
